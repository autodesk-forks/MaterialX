name: release

on:
  release:
    types: [published]

permissions:
  contents: read
  
jobs:

  release:
    name: Release Signing
    runs-on: ubuntu-latest
    env:
       RELEASE_TAG: ${{ github.ref_name }}
       NAGA_VERSION: "29.0.0"
    permissions:
      contents: write
      id-token: write
      repository-projects: write
       
    steps:
      - name: Sync Repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          submodules: recursive

      - name: Create Archive Name
        run: echo "MATERIALX_ARCHIVE=MaterialX-${RELEASE_TAG//v}" >> $GITHUB_ENV

      - name: Install Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: 3.11

      - name: Install naga
        run: cargo install naga-cli --locked --version ${NAGA_VERSION}

      - name: Generate WGSL library
        run: python source/MaterialXGenWgsl/tools/glsl_to_wgsl.py --libraries libraries --out libraries

      - name: Generate Archives
        run: |
          git archive --prefix ${MATERIALX_ARCHIVE}/ --output ${MATERIALX_ARCHIVE}.zip ${RELEASE_TAG}
          git archive --prefix ${MATERIALX_ARCHIVE}/ --output ${MATERIALX_ARCHIVE}.tar.gz ${RELEASE_TAG}

      - name: Sign and Upload Archives
        uses: sigstore/gh-action-sigstore-python@f514d46b907ebcd5bedc05145c03b69c1edd8b46 # v3.0.0
        with:
          inputs: |
            ${{ env.MATERIALX_ARCHIVE }}.zip
            ${{ env.MATERIALX_ARCHIVE }}.tar.gz
          upload-signing-artifacts: true
          release-signing-artifacts: false
