name: Create Tag on PR Merge

on:
  workflow_dispatch:

jobs:
  create-tag:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          
      - name: Get latest tag
        id: get_latest_tag
        run: |
          # Get the ASF repo tags
          git remote add upstream https://github.com/AcademySoftwareFoundation/MaterialX.git
          git fetch upstream --tags

          # Get the latest FINAL release tag from the ASF repo.
          # --refs drops peeled annotated-tag refs (the "<tag>^{}" lines), and the
          # grep keeps only vMAJOR.MINOR.PATCH tags so pre-releases (e.g. -rc1) are
          # excluded -- otherwise version:refname sorts "-rc1" after the final tag.
          latest_tag=$(git ls-remote --refs --tags --sort=version:refname upstream \
            | sed 's#.*refs/tags/##' \
            | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' \
            | tail -n1)
          echo "latest_tag=${latest_tag}"

          # Fail fast if no final release tag was found, so we never push a
          # malformed tag like ".Mon_YYYY.dev_adsk".
          if [ -z "$latest_tag" ]; then
            echo "Failed to determine a final release tag from upstream."
            exit 1
          fi

          echo "latest_tag=${latest_tag}" >> "$GITHUB_ENV"

      - name: Tag the repository
        run: |
          # Get the current date
          month=$(date +"%b")
          year=$(date +"%Y")

          # Create the new tag
          echo "latest_tag=${latest_tag}"
          new_tag="${latest_tag}.${month}_${year}.dev_adsk"
          echo "new_tag=${new_tag}"

          # Apply the new tag
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git tag ${new_tag}
          git push origin ${new_tag}
